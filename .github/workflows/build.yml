name: Build images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y buildah podman

      - name: Install tox
        run: pip install tox

      - name: Build images
        run: tox -e build

      - name: list images
        run: podman images
