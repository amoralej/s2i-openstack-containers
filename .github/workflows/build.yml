name: Build images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y buildah podman

      - name: Install tox
        run: pip install tox

      - name: Build images
        run: tox -e build

      - name: list images
        run: podman images

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y buildah podman

      - name: Install tox
        run: pip install tox

      - name: Log in to Quay.io
        run: podman login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build images
        run: tox -e build
        env:
          REGISTRY: quay.io
          NAMESPACE: amoralej
          TAG: "master-latest,master-${{ github.sha }}"

      - name: Push images
        run: tox -e custom -- push all
        env:
          REGISTRY: quay.io
          NAMESPACE: amoralej
          TAG: "master-latest,master-${{ github.sha }}"

      - name: List images
        run: podman images
