contentOrigin:
  repofiles:
    - ./rpms.repo
context:
  bare: true

#
# To update rpms.lock.yaml:
#    rpm-lockfile-prototype rpms.in.yaml
#

arches:
  - x86_64
  - aarch64

packages:
  - gcc
  - gcc-c++
  - git-core
  - httpd
  - libffi-devel
  - mod_ssl
  - openssl-devel
  - pciutils
  - python3-devel
  - python3-mod_wsgi
  - python3-setuptools
  - python3-wheel
